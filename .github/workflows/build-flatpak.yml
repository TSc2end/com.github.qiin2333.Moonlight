name: Build Flatpak

on:
  workflow_dispatch:
    inputs:
      version:
        description: '上游仓库发行版本号 (如 v6.2.90)，留空则自动检测上游最新稳定版'
        required: false
        default: ''
  schedule:
    - cron: '0 8 * * *'  # 每天 UTC 08:00 检查一次（北京时间 16:00）

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      commit: ${{ steps.get-version.outputs.commit }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get upstream version
        id: get-version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Manual input version: $VERSION"
          else
            echo "Auto-detecting latest upstream release..."
            RELEASE=$(curl -sL "https://api.github.com/repos/qiin2333/moonlight-qt/releases/latest")
            VERSION=$(echo "$RELEASE" | jq -r '.tag_name // empty')
            if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
              echo "No release found, skipping build."
              echo "version=" >> $GITHUB_OUTPUT
              echo "commit=" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # 通过 Git ref API 获取 tag 指向的真实 commit SHA
          TAG_DATA=$(curl -sL "https://api.github.com/repos/qiin2333/moonlight-qt/git/ref/tags/${VERSION}")
          SHA=$(echo "$TAG_DATA" | jq -r '.object.sha // empty')
          TYPE=$(echo "$TAG_DATA" | jq -r '.object.type // empty')

          if [ "$TYPE" = "tag" ]; then
            # annotated tag：需要再请求一次 tag 对象获取真正的 commit SHA
            COMMIT=$(curl -sL "https://api.github.com/repos/qiin2333/moonlight-qt/git/tags/${SHA}" | jq -r '.object.sha // empty')
          elif [ "$TYPE" = "commit" ]; then
            # lightweight tag：直接就是 commit SHA
            COMMIT="$SHA"
          else
            echo "Error: Unknown tag object type: $TYPE"
            exit 1
          fi

          if [ -z "$COMMIT" ]; then
            echo "Error: Cannot resolve commit for tag ${VERSION}"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "Upstream: $VERSION @ $COMMIT"
      - name: Check if already built
        id: check
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if git rev-parse "refs/tags/build-${VERSION}" >/dev/null 2>&1; then
            echo "Version $VERSION already built, skipping."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION not built yet, will build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container:
      image: fedora:44
      options: --privileged
    steps:
      - name: Install dependencies
        run: |
          dnf install -y git flatpak flatpak-builder jq curl

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flathub
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install KDE SDK
        run: |
          flatpak install -y flathub org.kde.Platform//6.10 org.kde.Sdk//6.10

      - name: Update manifest version
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          COMMIT="${{ needs.check-version.outputs.commit }}"
          echo "Building $VERSION @ $COMMIT"
          jq --arg version "$VERSION" --arg commit "$COMMIT" \
            '(.modules[] | select(.name == "moonlight").sources[0]) |= (.tag = $version | .commit = $commit)' \
            com.github.qiin2333.Moonlight.json > manifest.json
          mv manifest.json com.github.qiin2333.Moonlight.json
          echo "Updated manifest:"
          jq '.modules[] | select(.name == "moonlight").sources[0]' com.github.qiin2333.Moonlight.json

      - name: Build Flatpak
        run: |
          flatpak-builder --repo=repo --force-clean build-dir com.github.qiin2333.Moonlight.json

      - name: Create bundle
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          flatpak build-bundle repo "moonlight-qt-${VERSION}-x86_64.flatpak" com.github.qiin2333.Moonlight --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: moonlight-qt-${{ needs.check-version.outputs.version }}
          path: moonlight-qt-${{ needs.check-version.outputs.version }}-x86_64.flatpak

      - name: Create Release
        id: create-release
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"
          
          # 尝试创建 release
          RESPONSE=$(curl -sL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/releases" \
            -d "{
              \"tag_name\": \"build-${VERSION}\",
              \"name\": \"Moonlight ${VERSION}\",
              \"body\": \"Automated Flatpak build for ${VERSION}\\n\\nUpstream: https://github.com/qiin2333/moonlight-qt/releases/tag/${VERSION}\",
              \"draft\": false,
              \"prerelease\": false
            }")
          
          echo "Create release response:"
          echo "$RESPONSE" | jq .
          
          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.upload_url // empty')
          
          # 如果创建失败（release 已存在），获取已有 release
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Release may already exist, fetching existing release..."
            RESPONSE=$(curl -sL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${TOKEN}" \
              "https://api.github.com/repos/${REPO}/releases/tags/build-${VERSION}")
            RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
            UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.upload_url // empty')
          fi
          
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          echo "upload_url=$UPLOAD_URL" >> $GITHUB_OUTPUT

      - name: Upload Release Asset
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          FILE="moonlight-qt-${VERSION}-x86_64.flatpak"
          UPLOAD_URL="${{ steps.create-release.outputs.upload_url }}"
          
          # 处理 upload_url 模板，移除 {?name,label}
          URL="${UPLOAD_URL%\{*}"
          
          echo "Uploading ${FILE} to release..."
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/octet-stream" \
            "${URL}?name=${FILE}" \
            --data-binary "@${FILE}"
