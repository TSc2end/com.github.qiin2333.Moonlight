name: Build Flatpak

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v6.2.90)，留空则自动检测上游最新稳定版'
        required: false
        default: ''
  schedule:
    - cron: '0 8 * * *'  # 每天 UTC 08:00 检查一次（北京时间 16:00）

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      commit: ${{ steps.get-version.outputs.commit }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get upstream version
        id: get-version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            echo "Manual input version: $VERSION"
            COMMIT=$(curl -sL "https://api.github.com/repos/qiin2333/moonlight-qt/git/ref/tags/${VERSION}" | jq -r '.object.sha // empty')
            if [ -z "$COMMIT" ]; then
              echo "Error: Cannot find commit for tag ${VERSION}"
              exit 1
            fi
          else
            echo "Auto-detecting latest upstream release..."
            RELEASE=$(curl -sL "https://api.github.com/repos/qiin2333/moonlight-qt/releases/latest")
            VERSION=$(echo "$RELEASE" | jq -r '.tag_name // empty')
            if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
              echo "No release found, skipping build."
              echo "version=" >> $GITHUB_OUTPUT
              echo "commit=" >> $GITHUB_OUTPUT
              exit 0
            fi
            COMMIT=$(echo "$RELEASE" | jq -r '.target_commitish // empty')
            if [ -z "$COMMIT" ] || [ "$COMMIT" = "null" ]; then
              COMMIT=$(curl -sL "https://api.github.com/repos/qiin2333/moonlight-qt/git/ref/tags/${VERSION}" | jq -r '.object.sha // empty')
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "Upstream: $VERSION @ $COMMIT"

      - name: Check if already built
        id: check
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "should_build=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # 通过本地 git tag 记录已构建版本，避免重复构建
          if git rev-parse "refs/tags/build-${VERSION}" >/dev/null 2>&1; then
            echo "Version $VERSION already built, skipping."
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION not built yet, will build."
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container:
      image: fedora:44
      options: --privileged
    steps:
      - name: Install dependencies
        run: |
          dnf install -y git flatpak flatpak-builder jq curl nodejs

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flathub
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install KDE SDK
        run: |
          flatpak install -y flathub org.kde.Platform//6.10 org.kde.Sdk//6.10

      - name: Update manifest version
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          COMMIT="${{ needs.check-version.outputs.commit }}"
          echo "Building $VERSION @ $COMMIT"
          jq --arg version "$VERSION" --arg commit "$COMMIT" \
            '(.modules[] | select(.name == "moonlight").sources[0]) |= (.tag = $version | .commit = $commit)' \
            com.github.qiin2333.Moonlight.json > manifest.json
          mv manifest.json com.github.qiin2333.Moonlight.json
          echo "Updated manifest:"
          jq '.modules[] | select(.name == "moonlight").sources[0]' com.github.qiin2333.Moonlight.json

      - name: Build Flatpak
        run: |
          flatpak-builder --repo=repo --force-clean build-dir com.github.qiin2333.Moonlight.json

      - name: Create bundle
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          flatpak build-bundle repo "moonlight-qt-${VERSION}-x86_64.flatpak" com.github.qiin2333.Moonlight --runtime-repo=https://flathub.org/repo/flathub.flatpakrepo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: moonlight-qt-${{ needs.check-version.outputs.version }}
          path: moonlight-qt-${{ needs.check-version.outputs.version }}-x86_64.flatpak

      - name: Create build tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "build-${{ needs.check-version.outputs.version }}"
          git push origin "build-${{ needs.check-version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
